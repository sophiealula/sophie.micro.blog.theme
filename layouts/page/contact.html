{{ define "main" }}
<div class="contact-page">
  <h1 class="contact-heading">Let's <em>chat</em></h1>
  <p class="contact-intro">Always open to interesting conversations.</p>

  <div class="terminal">
    <div class="terminal-header">
      <div class="terminal-buttons">
        <span class="terminal-dot red"></span>
        <span class="terminal-dot yellow"></span>
        <span class="terminal-dot green"></span>
      </div>
      <span class="terminal-title">contact.sh</span>
    </div>
    <div class="terminal-body">
      <form class="terminal-form" id="contact-form" action="https://formspree.io/f/{{ .Site.Params.formspree_id | default "mlggrovy" }}" method="POST">
        <div class="terminal-line">
          <span class="terminal-prompt">$</span>
          <label for="name">name:</label>
          <input type="text" id="name" name="name" placeholder="your name" required>
        </div>
        <div class="terminal-line">
          <span class="terminal-prompt">$</span>
          <label for="email">email:</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="terminal-line terminal-line-textarea">
          <span class="terminal-prompt">$</span>
          <label for="message">message:</label>
          <textarea id="message" name="message" placeholder="what's on your mind?" rows="3" required></textarea>
        </div>
        <div class="terminal-line">
          <span class="terminal-prompt">$</span>
          <button type="submit" class="terminal-submit">send_message --to sophie</button>
        </div>
      </form>
      <div id="contact-success" class="terminal-success" style="display: none;">
        <div class="terminal-line">
          <span class="terminal-prompt" style="color: #27ca40;">&#10003;</span>
          <span style="color: #27ca40;">Message sent successfully!</span>
        </div>
        <div class="terminal-line">
          <span class="terminal-prompt">$</span>
          <span style="color: #888;">I'll get back to you soon.</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var form = document.getElementById('contact-form');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = form.querySelector('.terminal-submit');
    btn.textContent = 'sending...';
    btn.disabled = true;

    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    })
    .then(function(r) {
      if (r.ok) {
        form.style.display = 'none';
        document.getElementById('contact-success').style.display = 'block';
      } else {
        btn.textContent = 'error - try again';
        btn.disabled = false;
      }
    })
    .catch(function() {
      btn.textContent = 'error - try again';
      btn.disabled = false;
    });
  });
})();
</script>
{{ end }}
